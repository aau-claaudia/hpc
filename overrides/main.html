{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <script
    data-goatcounter="https://hpc-analytics.goatcounter.com/count"
    async
    src="//gc.zgo.at/count.js"></script>
{% endblock %}


{% block announce %}
<div class="announce-bar" role="status" aria-live="polite">
  <p class="announce-bar__title">Planned UCloud downtime </p>
  <p class="announce-bar__text">
    To enable migration to a new SDU datacenter, the UCloud platform will be unavailable until May 4th.
  </p>
  <div class="announce-bar__links">
    <a class="announce-bar__link" href="https://status.cloud.sdu.dk/" aria-label="Open migration guide">UCloud status</a>
  </div>
</div>
{% endblock %}
